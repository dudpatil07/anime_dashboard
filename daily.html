<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Anime Pick - AnimeVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff2a6d;
            --secondary: #05d9e8;
            --accent: #d1f7ff;
            --dark: #0a0a0f;
            --darker: #050508;
            --card-bg: rgba(15, 15, 25, 0.9);
            --neon-pink: #ff2a6d;
            --neon-cyan: #05d9e8;
            --neon-purple: #b026ff;
            --neon-yellow: #ffd700;
            --neon-green: #39ff14;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--darker);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255, 42, 109, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(5, 217, 232, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(176, 38, 255, 0.15) 0%, transparent 50%),
                var(--darker);
        }

        /* Shooting Stars */
        .shooting-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--secondary), transparent);
            animation: shoot 3s linear infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(100px) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(100vw) translateY(-100vh) rotate(-45deg); opacity: 0; }
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(5, 5, 8, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 42, 109, 0.3);
            padding: 0 2rem;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            letter-spacing: 2px;
            text-decoration: none;
        }

        .back-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .back-btn:hover {
            border-color: var(--secondary);
            box-shadow: 0 0 20px rgba(5, 217, 232, 0.3);
            transform: translateY(-2px);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 2rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Date Display */
        .date-display {
            text-align: center;
            margin-bottom: 2rem;
        }

        .date-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }

        .date-value {
            font-family: 'Bangers', cursive;
            font-size: 2.5rem;
            color: var(--neon-yellow);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }

        /* Generator Section */
        .generator-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* Wheel Container */
        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 2rem 0;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 
                0 0 30px rgba(255, 42, 109, 0.4),
                inset 0 0 30px rgba(255, 42, 109, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .wheel.spinning {
            animation: wheelSpin 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        @keyframes wheelSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(1800deg); }
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: var(--dark);
            border-radius: 50%;
            border: 3px solid var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 20px rgba(5, 217, 232, 0.5);
        }

        .wheel-center i {
            font-size: 2rem;
            color: var(--secondary);
        }

        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 20px;
        }

        .wheel-segment:nth-child(1) { background: rgba(255, 42, 109, 0.3); transform: rotate(0deg); }
        .wheel-segment:nth-child(2) { background: rgba(5, 217, 232, 0.3); transform: rotate(45deg); }
        .wheel-segment:nth-child(3) { background: rgba(176, 38, 255, 0.3); transform: rotate(90deg); }
        .wheel-segment:nth-child(4) { background: rgba(255, 215, 0, 0.3); transform: rotate(135deg); }
        .wheel-segment:nth-child(5) { background: rgba(57, 255, 20, 0.3); transform: rotate(180deg); }
        .wheel-segment:nth-child(6) { background: rgba(255, 42, 109, 0.3); transform: rotate(225deg); }
        .wheel-segment:nth-child(7) { background: rgba(5, 217, 232, 0.3); transform: rotate(270deg); }
        .wheel-segment:nth-child(8) { background: rgba(176, 38, 255, 0.3); transform: rotate(315deg); }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--neon-yellow);
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
            z-index: 20;
        }

        /* Generate Button */
        .generate-btn {
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, var(--primary), var(--neon-purple));
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(255, 42, 109, 0.4);
            position: relative;
            overflow: hidden;
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .generate-btn:hover::before {
            left: 100%;
        }

        .generate-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 42, 109, 0.6);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .generate-btn i {
            margin-right: 0.5rem;
        }

        /* Result Card */
        .result-card {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }

        .result-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            display: block;
        }

        .result-header {
            position: relative;
            height: 400px;
            overflow: hidden;
        }

        .result-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 250px;
            background: linear-gradient(transparent, var(--card-bg));
        }

        .result-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--neon-yellow), #ff8c00);
            border-radius: 50px;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            color: var(--dark);
            z-index: 10;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .result-body {
            padding: 2rem;
            margin-top: -100px;
            position: relative;
            z-index: 2;
        }

        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        .result-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .result-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .result-meta-item i {
            color: var(--secondary);
        }

        .result-genres {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .result-genre-tag {
            padding: 0.5rem 1.2rem;
            background: rgba(5, 217, 232, 0.15);
            border: 1px solid rgba(5, 217, 232, 0.3);
            color: var(--secondary);
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
        }

        .result-description {
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 2rem;
            font-size: 1.15rem;
        }

        .result-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .result-action-btn {
            padding: 0.9rem 1.8rem;
            border-radius: 12px;
            border: none;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .result-action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn-fav { background: linear-gradient(135deg, var(--primary), #ff0055); color: #fff; }
        .btn-watch { background: linear-gradient(135deg, var(--secondary), #00a8b5); color: var(--dark); }
        .btn-library { background: linear-gradient(135deg, var(--neon-purple), #7c1fd1); color: #fff; }

        .result-external-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-external-btn {
            flex: 1;
            min-width: 200px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            text-decoration: none;
        }

        .result-external-btn:hover {
            transform: translateY(-3px);
        }

        .result-external-btn.crunchyroll {
            border-color: rgba(244, 117, 33, 0.3);
        }
        .result-external-btn.crunchyroll:hover {
            background: rgba(244, 117, 33, 0.15);
            border-color: #f47521;
            box-shadow: 0 8px 25px rgba(244, 117, 33, 0.3);
        }

        .result-external-btn.anikai {
            border-color: rgba(255, 107, 107, 0.3);
        }
        .result-external-btn.anikai:hover {
            background: rgba(255, 107, 107, 0.15);
            border-color: #ff6b6b;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
        }

        /* Countdown */
        .countdown {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .countdown-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .countdown-item {
            text-align: center;
        }

        .countdown-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(255, 42, 109, 0.5);
        }

        .countdown-unit {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 1rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes toastOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .wheel-container {
                width: 280px;
                height: 280px;
            }

            .result-title {
                font-size: 1.8rem;
            }

            .result-header {
                height: 250px;
            }

            .generate-btn {
                padding: 1rem 2rem;
                font-size: 1.1rem;
            }

            .countdown-timer {
                gap: 0.8rem;
            }

            .countdown-value {
                font-size: 1.5rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--darker);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="shooting-stars" id="shootingStars"></div>
    <div class="confetti-container" id="confettiContainer"></div>

    <header>
        <div class="header-content">
            <a href="index.html" class="logo">ANIMEVERSE</a>
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Browse
            </a>
        </div>
    </header>

    <div class="container">
        <div class="date-display">
            <div class="date-label">Today's Date</div>
            <div class="date-value" id="dateValue">Loading...</div>
        </div>

        <div class="generator-section">
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <div class="wheel" id="wheel">
                    <div class="wheel-segment">Action</div>
                    <div class="wheel-segment">Romance</div>
                    <div class="wheel-segment">Fantasy</div>
                    <div class="wheel-segment">Sci-Fi</div>
                    <div class="wheel-segment">Drama</div>
                    <div class="wheel-segment">Comedy</div>
                    <div class="wheel-segment">Horror</div>
                    <div class="wheel-segment">Sports</div>
                    <div class="wheel-center">
                        <i class="fas fa-star"></i>
                    </div>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn" onclick="generateDailyAnime()">
                <i class="fas fa-dice"></i> Spin for Today's Anime
            </button>

            <div class="result-card" id="resultCard">
                <div class="result-header">
                    <img class="result-image" id="resultImage" src="" alt="">
                    <div class="result-badge">Today's Pick!</div>
                </div>
                <div class="result-body">
                    <h2 class="result-title" id="resultTitle"></h2>
                    <div class="result-meta">
                        <div class="result-meta-item">
                            <i class="fas fa-star"></i>
                            <span id="resultRating"></span>
                        </div>
                        <div class="result-meta-item">
                            <i class="fas fa-calendar"></i>
                            <span id="resultYear"></span>
                        </div>
                        <div class="result-meta-item">
                            <i class="fas fa-tv"></i>
                            <span id="resultEpisodes"></span>
                        </div>
                        <div class="result-meta-item">
                            <i class="fas fa-clock"></i>
                            <span id="resultStatus"></span>
                        </div>
                    </div>
                    <div class="result-genres" id="resultGenres"></div>
                    <p class="result-description" id="resultDescription"></p>
                    <div class="result-actions">
                        <button class="result-action-btn btn-fav" id="resultFavBtn" onclick="toggleResultAnime('favorite')">
                            <i class="fas fa-heart"></i> Add to Favorites
                        </button>
                        <button class="result-action-btn btn-watch" id="resultWatchBtn" onclick="toggleResultAnime('watched')">
                            <i class="fas fa-check"></i> Mark as Watched
                        </button>
                        <button class="result-action-btn btn-library" id="resultLibBtn" onclick="toggleResultAnime('library')">
                            <i class="fas fa-bookmark"></i> Add to Library
                        </button>
                    </div>
                    <div class="result-external-links">
                        <a href="#" id="resultCrunchyroll" target="_blank" class="result-external-btn crunchyroll">
                            <i class="fas fa-play-circle"></i> Watch on Crunchyroll
                        </a>
                        <a href="#" id="resultAnikai" target="_blank" class="result-external-btn anikai">
                            <i class="fas fa-tv"></i> Watch on Anikai
                        </a>
                    </div>
                </div>
            </div>

            <div class="countdown">
                <div class="countdown-label">Next Daily Pick In</div>
                <div class="countdown-timer">
                    <div class="countdown-item">
                        <div class="countdown-value" id="hours">00</div>
                        <div class="countdown-unit">Hours</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-value" id="minutes">00</div>
                        <div class="countdown-unit">Minutes</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-value" id="seconds">00</div>
                        <div class="countdown-unit">Seconds</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>

        // Anime Data (same as main app)
        const animeData = [
            { id: 1, title: "Attack on Titan", genres: ["Action", "Drama", "Fantasy"], rating: 9.1, year: 2013, episodes: "87", status: "Completed", image: "https://cdn.myanimelist.net/images/anime/10/47347.jpg", description: "Humanity lives inside cities surrounded by enormous walls that protect them from gigantic man-eating humanoids referred to as Titans." },

            45: "https://anikai.to/anime/odd-taxi",
            46: "https://anikai.to/anime/ping-pong-the-animation",
            47: "https://anikai.to/anime/land-of-the-lustrous",
            48: "https://anikai.to/anime/showa-genroku-rakugo-shinju"
        };

        let currentAnime = null;
        let favorites = JSON.parse(localStorage.getItem('anime_favorites') || '[]');
        let library = JSON.parse(localStorage.getItem('anime_library') || '[]');
        let watched = JSON.parse(localStorage.getItem('anime_watched') || '[]');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            displayDate();
            createShootingStars();
            startCountdown();
            checkDailyAnime();
        });

        // Display current date
        function displayDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateValue').textContent = now.toLocaleDateString('en-US', options);
        }

        // Create shooting stars
        function createShootingStars() {
            const container = document.getElementById('shootingStars');
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('div');
                star.className = 'shooting-star';
                star.style.top = Math.random() * 50 + '%';
                star.style.left = Math.random() * 50 + '%';
                star.style.animationDelay = (i * 2) + 's';
                star.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(star);
            }
        }

        // Generate daily anime based on date seed
        function generateDailyAnime() {
            const btn = document.getElementById('generateBtn');
            const wheel = document.getElementById('wheel');

            btn.disabled = true;
            wheel.classList.add('spinning');

            // Play spin sound effect (optional - using visual feedback instead)

            setTimeout(() => {
                wheel.classList.remove('spinning');

                // Get today's anime based on date
                const anime = getTodaysAnime();
                currentAnime = anime;

                // Show result with animation
                showResult(anime);
                createConfetti();

                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-redo"></i> Spin Again';

                // Save to localStorage that user checked today
                const today = new Date().toDateString();
                localStorage.setItem('daily_anime_last_check', today);
                localStorage.setItem('daily_anime_id', anime.id);

            }, 4000);
        }

        // Get anime based on today's date (deterministic)
        function getTodaysAnime() {
            const today = new Date();
            const dateString = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();

            // Create a hash from the date string
            let hash = 0;
            for (let i = 0; i < dateString.length; i++) {
                const char = dateString.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }

            // Use absolute value and modulo to get index
            const index = Math.abs(hash) % animeData.length;
            return animeData[index];
        }

        // Check if user already viewed today's anime
        function checkDailyAnime() {
            const lastCheck = localStorage.getItem('daily_anime_last_check');
            const today = new Date().toDateString();

            if (lastCheck === today) {
                const savedId = parseInt(localStorage.getItem('daily_anime_id'));
                const anime = animeData.find(a => a.id === savedId);
                if (anime) {
                    currentAnime = anime;
                    showResult(anime);
                    document.getElementById('generateBtn').innerHTML = '<i class="fas fa-redo"></i> Spin Again';
                }
            }
        }

        // Show result card
        function showResult(anime) {
            const card = document.getElementById('resultCard');

            document.getElementById('resultImage').src = anime.image;
            document.getElementById('resultTitle').textContent = anime.title;
            document.getElementById('resultRating').textContent = anime.rating + ' / 10';
            document.getElementById('resultYear').textContent = anime.year;
            document.getElementById('resultEpisodes').textContent = anime.episodes + ' Episodes';
            document.getElementById('resultStatus').textContent = anime.status;
            document.getElementById('resultDescription').textContent = anime.description;

            document.getElementById('resultGenres').innerHTML = anime.genres.map(g => 
                `<span class="result-genre-tag">${g}</span>`
            ).join('');

            document.getElementById('resultCrunchyroll').href = crunchyrollLinks[anime.id] || '#';
            document.getElementById('resultAnikai').href = anikaiLinks[anime.id] || '#';

            updateResultButtons();

            card.style.display = 'block';
            // Trigger reflow
            void card.offsetWidth;
            card.classList.add('show');

            // Scroll to result
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);
        }

        // Update result action buttons
        function updateResultButtons() {
            if (!currentAnime) return;
            const id = currentAnime.id;

            const isFav = favorites.includes(id);
            const isWatch = watched.includes(id);
            const isLib = library.includes(id);

            document.getElementById('resultFavBtn').innerHTML = 
                `<i class="fas fa-heart"></i> ${isFav ? 'In Favorites' : 'Add to Favorites'}`;
            document.getElementById('resultWatchBtn').innerHTML = 
                `<i class="fas fa-check"></i> ${isWatch ? 'Watched' : 'Mark as Watched'}`;
            document.getElementById('resultLibBtn').innerHTML = 
                `<i class="fas fa-bookmark"></i> ${isLib ? 'In Library' : 'Add to Library'}`;
        }

        // Toggle anime status from result
        function toggleResultAnime(type) {
            if (!currentAnime) return;

            let list, key, name;
            if (type === 'favorite') {
                list = favorites;
                key = 'anime_favorites';
                name = 'Favorites';
            } else if (type === 'watched') {
                list = watched;
                key = 'anime_watched';
                name = 'Watched';
            } else {
                list = library;
                key = 'anime_library';
                name = 'Library';
            }

            const index = list.indexOf(currentAnime.id);

            if (index > -1) {
                list.splice(index, 1);
                showToast('Removed from ' + name, 'info');
            } else {
                list.push(currentAnime.id);
                showToast('Added to ' + name, 'success');
            }

            localStorage.setItem(key, JSON.stringify(list));
            updateResultButtons();
        }

        // Create confetti effect
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ff2a6d', '#05d9e8', '#b026ff', '#ffd700', '#39ff14'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = (Math.random() * 2) + 's';
                confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                container.appendChild(confetti);

                setTimeout(() => confetti.remove(), 4000);
            }
        }

        // Countdown to next day
        function startCountdown() {
            function update() {
                const now = new Date();
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(0, 0, 0, 0);

                const diff = tomorrow - now;

                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            }

            update();
            setInterval(update, 1000);
        }

        // Show toast
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;

            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                info: 'fa-info-circle'
            };

            toast.innerHTML = `
                <i class="fas ${icons[type]} toast-icon"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
